server {
    listen 80;
    server_name myungmoon.or.kr www.myungmoon.or.kr admin.myungmoon.or.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name myungmoon.or.kr www.myungmoon.or.kr;

    ssl_certificate /etc/letsencrypt/live/myungmoon.or.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myungmoon.or.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # client-renewal
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 443 ssl;
    server_name admin.myungmoon.or.kr;

    ssl_certificate /etc/letsencrypt/live/myungmoon.or.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myungmoon.or.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # admin
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
